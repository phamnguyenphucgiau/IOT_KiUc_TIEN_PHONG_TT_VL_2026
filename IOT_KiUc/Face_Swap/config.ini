# Face Swap Configuration File
# Tệp cấu hình cho hệ thống Face Swap

[general]
# Tên ứng dụng
app_name = Face Swap AI
# Phiên bản
version = 1.0.0
# Mô tả
description = Công nghệ Face Swap tiên tiến cho MC Ảo

[server]
# Host
host = 0.0.0.0
# Port
port = 5000
# Debug mode
debug = True
# CORS enabled
cors_enabled = True

[processing]
# Sử dụng GPU
use_gpu = True
# Độ chất lượng xử lý (low, medium, high)
quality = high
# Tối ưu hóa mặc định
default_blur_strength = 1.0
default_blend_strength = 1.0
# Hiệu chỉnh màu sắc
color_correction = True
# Seamless cloning
seamless_cloning = True

[upload]
# Thư mục upload
upload_folder = uploads
# Thư mục output
output_folder = outputs
# Kích thước file tối đa (MB)
max_file_size = 50
# Định dạng file được phép
allowed_extensions = png,jpg,jpeg,bmp,gif

[models]
# Đường dẫn model dlib
shape_predictor_path = models/shape_predictor_68_face_landmarks.dat
# Tự động tải model nếu không tồn tại
auto_download_models = False

[logging]
# Log level (DEBUG, INFO, WARNING, ERROR)
level = INFO
# File log
log_file = face_swap.log
# Kích thước log tối đa (MB)
max_log_size = 10

[security]
# Xác thực API
require_api_key = False
# API Key (nếu bật)
api_key = your_api_key_here
# Rate limiting
rate_limit = 100
# Rate limit window (seconds)
rate_limit_window = 60
